<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curious</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Affix Light';
            src: local('Affix Light'), local('affix-light');
            font-weight: 300;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFFFFF;
            color: #0B0907;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 90px;
            padding: 0 20px;
            background-color: #FFFFFF;
        }

        .logo a {
            display: block;
            text-decoration: none;
        }

        .logo svg {
            width: 140px;
            height: 31px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 30px;
            font-family: 'Inter', sans-serif;
        }

        .nav-links a {
            text-decoration: none;
            color: #0B0907;
            font-size: 14px;
            font-weight: 400;
            transition: opacity 0.2s ease;
        }

        .nav-links a:hover {
            opacity: 0.7;
        }

        .nav-links .dropdown {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .nav-links .dropdown svg {
            width: 12px;
            height: 12px;
        }

        .nav-links .log-in {
            padding: 8px 16px;
            border: 1px solid #0B0907;
            border-radius: 2px;
            background: transparent;
        }

        .nav-links .get-started {
            padding: 8px 16px;
            background-color: #0B0907;
            color: #FFFFFF !important;
            border-radius: 2px;
        }

        .nav-links .get-started:hover {
            opacity: 0.9;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 60px 20px 40px;
            background-color: #F6F5F4;
        }

        .hero h1 {
            font-family: 'Affix Light', 'Inter', sans-serif;
            font-size: 100px;
            font-weight: 400;
            color: #0B0907;
            line-height: 90px;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .hero p {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 400;
            color: #0B0907;
            line-height: 1.5;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Image Gallery */
        .gallery {
            position: relative;
            display: flex;
            width: 100%;
            height: 540px;
            background-color: #F6F5F4;
        }

        .gallery-panel {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .gallery-panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* GIF Overlay */
        .gif-overlay {
            position: absolute;
            top: 0;
            left: 16%;
            width: 70%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .gif-overlay img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            display: block;
        }
    </style>
</head>
<body>

                </svg>
            </a>
        </div>
        <div class="nav-links">
            <div class="dropdown">
                <a href="#">Solutions For</a>
                <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 5l3 3 3-3" stroke="#0B0907" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <a href="./pricing">Pricing</a>
            <a href="./company">Company</a>
            <a href="https://gettingcurious.com/help-center">Support</a>
            <a href="https://admin.mindlogger.org/#/login?lang=en_US" class="log-in">Log In</a>
            <a href="./contact" class="get-started">Get Started</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Organize a jornada.<br>Potencialize a cura.</h1>
        <p>Evidence-based tools for scientific discovery and better real-world outcomes.</p>
    </section>

    <!-- Image Gallery with GIF Overlay -->
    <section class="gallery">
        <div class="gallery-panel">
            <img src="https://framerusercontent.com/images/mC0Sc4vTdjcQqUVBVx1FhCQ.png" alt="">
        </div>
        <div class="gallery-panel">
            <img src="https://framerusercontent.com/images/rwyV1jqnGKXOf7GSXDcYednbUwY.png" alt="">
        </div>
        <div class="gallery-panel">
            <img src="https://framerusercontent.com/images/OaQ3oQjxq0byEb1WtRvNY9MNPMk.png" alt="">
        </div>
        <!-- GIF Overlay on top -->
        <div class="gif-overlay">
            <img src="https://framerusercontent.com/images/pnBNiqSTQAyb7J4zzu8XVt8Y.gif" alt="">
        </div>
    </section>
</body>
</html>
