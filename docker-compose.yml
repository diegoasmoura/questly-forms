services:
  db:
    image: postgres:16-alpine
    container_name: curious-db
    restart: always
    environment:
      POSTGRES_USER: curious
      POSTGRES_PASSWORD: curious_secret
      POSTGRES_DB: curious_forms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curious"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: curious-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://curious:curious_secret@db:5432/curious_forms
      JWT_SECRET: super_secret_jwt_key_change_in_production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: curious-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
